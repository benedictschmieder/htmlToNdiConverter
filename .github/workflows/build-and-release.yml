name: Build and Release

# Builds the Windows executable (installer) and publishes it.
#
# - On a version tag push (e.g. v1.0.0): builds and creates a GitHub Release
#   with the installer attached.
# - On manual run (workflow_dispatch): builds and uploads the installer as a
#   workflow artifact you can download from the run page.
#
# The native addon is compiled against the NDI 6 SDK that is committed to the
# repo as an ENCRYPTED blob (vendor/ndi-sdk.enc). The workflow decrypts it at
# build time using the NDI_SDK_KEY repository secret. See vendor/README.txt.
#
# Required one-time setup:
#   - Add repository secret NDI_SDK_KEY with the passphrase used to encrypt
#     vendor/ndi-sdk.enc (the encrypted blob is already committed).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Decrypt NDI SDK
        shell: pwsh
        env:
          NDI_SDK_KEY: ${{ secrets.NDI_SDK_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:NDI_SDK_KEY)) {
            Write-Error "Repository secret 'NDI_SDK_KEY' is not set. Add the passphrase used to encrypt vendor/ndi-sdk.enc (see vendor/README.txt)."
            exit 1
          }
          if (-not (Test-Path "vendor/ndi-sdk.enc")) {
            Write-Error "vendor/ndi-sdk.enc not found. Create it with 'node scripts/crypt-ndi.js encrypt <sourceDir>' and commit it (see vendor/README.txt)."
            exit 1
          }
          node scripts/crypt-ndi.js decrypt vendor/ndi-sdk.enc vendor/ndi
          $required = @(
            "vendor/ndi/Include/Processing.NDI.Lib.h",
            "vendor/ndi/Lib/x64/Processing.NDI.Lib.x64.lib",
            "vendor/ndi/Bin/x64/Processing.NDI.Lib.x64.dll"
          )
          $missing = $required | Where-Object { -not (Test-Path $_) }
          if ($missing) {
            Write-Error ("Decrypted SDK is missing expected files:`n  " + ($missing -join "`n  "))
            exit 1
          }
          Write-Host "NDI SDK decrypted to vendor/ndi."

      - name: Install dependencies and build native addon
        run: npm ci

      - name: Package Windows executable
        run: npm run dist

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: HTMLtoNDI-windows
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml
          generate_release_notes: true
